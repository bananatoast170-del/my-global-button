<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קליקר אקסטרים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap');
        
        body {
            font-family: 'Assistant', sans-serif;
            background: radial-gradient(circle, #1a202c 0%, #0d1117 100%);
            user-select: none;
        }

        .click-animation {
            animation: click-pop 0.1s ease-out;
        }

        @keyframes click-pop {
            0% { transform: scale(1); }
            50% { transform: scale(0.92); }
            100% { transform: scale(1); }
        }

        .floating-text {
            position: absolute;
            pointer-events: none;
            animation: float-up 1s ease-out forwards;
            font-weight: bold;
            color: #fbbf24;
        }

        @keyframes float-up {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px border rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen text-white flex flex-col items-center justify-center p-4">

    <!-- Header & Score -->
    <div class="text-center mb-8">
        <h1 class="text-5xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500">
            קליקר אקסטרים
        </h1>
        <div class="text-3xl font-bold text-gray-300">
            <span id="score-display">0</span> נקודות
        </div>
        <div class="text-sm text-blue-400 mt-2">
            ייצור אוטומטי: <span id="pps-display">0</span> לשנייה
        </div>
    </div>

    <!-- Main Game Area -->
    <div class="relative flex flex-col items-center">
        <!-- Main Clicker Button -->
        <button id="clicker-btn" class="relative w-48 h-48 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 shadow-2xl flex items-center justify-center border-8 border-white/10 hover:brightness-110 transition-all active:scale-95 focus:outline-none overflow-hidden">
            <span class="text-6xl">🚀</span>
        </button>
        <div id="click-container" class="absolute inset-0 pointer-events-none"></div>
    </div>

    <!-- Upgrades Section -->
    <div class="mt-12 grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl">
        
        <!-- Upgrade 1: Click Power -->
        <button id="upgrade-click" class="glass-card p-4 rounded-xl flex justify-between items-center hover:bg-white/10 transition-colors disabled:opacity-50 disabled:cursor-not-allowed border border-white/10">
            <div class="text-right">
                <div class="font-bold text-lg">לחיצת טורבו</div>
                <div class="text-sm text-gray-400">+<span id="click-inc">1</span> לכל לחיצה</div>
            </div>
            <div class="text-left font-bold text-yellow-400">
                מחיר: <span id="click-cost">10</span>
            </div>
        </button>

        <!-- Upgrade 2: Auto Clicker -->
        <button id="upgrade-auto" class="glass-card p-4 rounded-xl flex justify-between items-center hover:bg-white/10 transition-colors disabled:opacity-50 disabled:cursor-not-allowed border border-white/10">
            <div class="text-right">
                <div class="font-bold text-lg">רובוט לחיצות</div>
                <div class="text-sm text-gray-400">+1 נקודה לשנייה</div>
            </div>
            <div class="text-left font-bold text-yellow-400">
                מחיר: <span id="auto-cost">50</span>
            </div>
        </button>

    </div>

    <script>
        // Game State
        let score = 0;
        let pointsPerClick = 1;
        let pointsPerSecond = 0;

        let clickUpgradeCost = 10;
        let autoUpgradeCost = 50;

        // Elements
        const scoreEl = document.getElementById('score-display');
        const ppsEl = document.getElementById('pps-display');
        const clickBtn = document.getElementById('clicker-btn');
        const clickContainer = document.getElementById('click-container');
        
        const upgradeClickBtn = document.getElementById('upgrade-click');
        const clickCostEl = document.getElementById('click-cost');
        const clickIncEl = document.getElementById('click-inc');

        const upgradeAutoBtn = document.getElementById('upgrade-auto');
        const autoCostEl = document.getElementById('auto-cost');

        // Logic Functions
        function updateUI() {
            scoreEl.innerText = Math.floor(score).toLocaleString();
            ppsEl.innerText = pointsPerSecond;
            
            // Handle Upgrade buttons visual state
            upgradeClickBtn.disabled = score < clickUpgradeCost;
            upgradeAutoBtn.disabled = score < autoUpgradeCost;
        }

        function createFloatingText(value) {
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = `+${value}`;
            
            // Randomize position a bit
            const x = (Math.random() - 0.5) * 100;
            text.style.left = `calc(50% + ${x}px)`;
            text.style.top = `20%`;
            
            clickContainer.appendChild(text);
            
            setTimeout(() => {
                text.remove();
            }, 1000);
        }

        // Event Listeners
        clickBtn.addEventListener('click', (e) => {
            score += pointsPerClick;
            clickBtn.classList.remove('click-animation');
            void clickBtn.offsetWidth; // Trigger reflow
            clickBtn.classList.add('click-animation');
            
            createFloatingText(pointsPerClick);
            updateUI();
        });

        upgradeClickBtn.addEventListener('click', () => {
            if (score >= clickUpgradeCost) {
                score -= clickUpgradeCost;
                pointsPerClick += 1;
                clickUpgradeCost = Math.floor(clickUpgradeCost * 1.6);
                
                clickCostEl.innerText = clickUpgradeCost;
                clickIncEl.innerText = pointsPerClick;
                updateUI();
            }
        });

        upgradeAutoBtn.addEventListener('click', () => {
            if (score >= autoUpgradeCost) {
                score -= autoUpgradeCost;
                pointsPerSecond += 1;
                autoUpgradeCost = Math.floor(autoUpgradeCost * 1.8);
                
                autoCostEl.innerText = autoUpgradeCost;
                updateUI();
            }
        });

        // Game Loop (Passive Income)
        setInterval(() => {
            if (pointsPerSecond > 0) {
                score += (pointsPerSecond / 10); // Update every 100ms
                updateUI();
            }
        }, 100);

        // Initial UI Update
        updateUI();
    </script>
</body>
</html>
