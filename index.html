<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>משחק קליקר מגניב</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        
        #score-display {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #f1c40f;
        }

        #click-button {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: none;
            background-color: #e74c3c;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px #c0392b;
            transition: all 0.1s;
            outline: none;
        }

        #click-button:active {
            box-shadow: 0 2px #c0392b;
            transform: translateY(8px);
        }

        .upgrade-section {
            margin-top: 2rem;
        }

        button.upgrade {
            padding: 10px 20px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        button.upgrade:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>קליקר!</h1>
        <div id="score-display">נקודות: <span id="score">0</span></div>
        
        <button id="click-button">לחץ עליי!</button>

        <div class="upgrade-section">
            <button id="upgrade-btn" class="upgrade">שדרוג: +2 לכל לחיצה (מחיר: 10)</button>
        </div>
    </div>

    <script>
        // משתני המשחק
        let score = 0;
        let pointsPerClick = 1;
        let upgradeCost = 10;

        // אלמנטים מה-DOM
        const scoreElement = document.getElementById('score');
        const clickBtn = document.getElementById('click-button');
        const upgradeBtn = document.getElementById('upgrade-btn');

        // פונקציית לחיצה
        clickBtn.addEventListener('click', () => {
            score += pointsPerClick;
            updateDisplay();
        });

        // פונקציית שדרוג
        upgradeBtn.addEventListener('click', () => {
            if (score >= upgradeCost) {
                score -= upgradeCost;
                pointsPerClick += 1;
                upgradeCost = Math.floor(upgradeCost * 1.5); // המחיר עולה
                
                upgradeBtn.innerText = `שדרוג: +${pointsPerClick + 1} לכל לחיצה (מחיר: ${upgradeCost})`;
                updateDisplay();
            }
        });

        // עדכון התצוגה והכפתורים
        function updateDisplay() {
            scoreElement.innerText = score;
            
            // בדיקה אם אפשר לקנות שדרוג
            if (score >= upgradeCost) {
                upgradeBtn.disabled = false;
            } else {
                upgradeBtn.disabled = true;
            }
        }

        // אתחול ראשוני
        updateDisplay();
    </script>
</body>
</html>
