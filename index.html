<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הקליקר המטורף</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            background: var(--card);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .score-section {
            margin-bottom: 2rem;
        }

        .score-label {
            font-size: 1rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary);
            margin: 0.5rem 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 12px;
        }

        #click-area {
            position: relative;
            margin-bottom: 2rem;
        }

        .main-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 3rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            transition: transform 0.1s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .main-btn:active {
            transform: scale(0.92);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .shop-title {
            text-align: right;
            font-weight: bold;
            margin-bottom: 1rem;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 5px;
        }

        .upgrade-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .upgrade-info {
            text-align: right;
        }

        .upgrade-name {
            font-weight: bold;
            display: block;
        }

        .upgrade-cost {
            font-size: 0.85rem;
            color: #64748b;
        }

        .buy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .buy-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        /* אנימציה של מספר צף */
        .floating-text {
            position: absolute;
            color: var(--primary);
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="score-section">
        <div class="score-label">הניקוד שלך</div>
        <div class="score-value" id="score">0</div>
        <div class="stats-grid">
            <div>לחיצה: <span id="per-click">1</span></div>
            <div>לשנייה: <span id="per-second">0</span></div>
        </div>
    </div>

    <div id="click-area">
        <button class="main-btn" id="click-btn">💰</button>
    </div>

    <div class="shop">
        <div class="shop-title">חנות שדרוגים</div>
        
        <div class="upgrade-card">
            <div class="upgrade-info">
                <span class="upgrade-name">אצבע חזקה</span>
                <span class="upgrade-cost" id="cost-clicker">מחיר: 15</span>
            </div>
            <button class="buy-btn" id="buy-clicker">קנה</button>
        </div>

        <div class="upgrade-card">
            <div class="upgrade-info">
                <span class="upgrade-name">רובוט קליקים</span>
                <span class="upgrade-cost" id="cost-auto">מחיר: 100</span>
            </div>
            <button class="buy-btn" id="buy-auto">קנה</button>
        </div>
    </div>
</div>

<script>
    // משתני מצב המשחק
    let state = {
        score: 0,
        pointsPerClick: 1,
        autoClickValue: 0,
        clickerLevel: 0,
        autoLevel: 0,
        clickerBasePrice: 15,
        autoBasePrice: 100
    };

    // אלמנטים
    const scoreEl = document.getElementById('score');
    const perClickEl = document.getElementById('per-click');
    const perSecondEl = document.getElementById('per-second');
    const clickBtn = document.getElementById('click-btn');
    const clickArea = document.getElementById('click-area');

    // כפתורי חנות
    const buyClickerBtn = document.getElementById('buy-clicker');
    const buyAutoBtn = document.getElementById('buy-auto');
    const costClickerEl = document.getElementById('cost-clicker');
    const costAutoEl = document.getElementById('cost-auto');

    // פונקציית עדכון תצוגה
    function updateUI() {
        scoreEl.innerText = Math.floor(state.score);
        perClickEl.innerText = state.pointsPerClick;
        perSecondEl.innerText = state.autoClickValue;

        // חישוב מחירים
        const nextClickerPrice = Math.floor(state.clickerBasePrice * Math.pow(1.5, state.clickerLevel));
        const nextAutoPrice = Math.floor(state.autoBasePrice * Math.pow(1.5, state.autoLevel));

        costClickerEl.innerText = `מחיר: ${nextClickerPrice}`;
        costAutoEl.innerText = `מחיר: ${nextAutoPrice}`;

        buyClickerBtn.disabled = state.score < nextClickerPrice;
        buyAutoBtn.disabled = state.score < nextAutoPrice;
    }

    // יצירת מספר צף
    function createFloatingText(x, y, text) {
        const span = document.createElement('span');
        span.className = 'floating-text';
        span.innerText = `+${text}`;
        span.style.left = `${x}px`;
        span.style.top = `${y}px`;
        clickArea.appendChild(span);
        setTimeout(() => span.remove(), 800);
    }

    // לחיצה
    clickBtn.addEventListener('click', (e) => {
        state.score += state.pointsPerClick;
        
        // מיקום המספר הצף
        const rect = clickBtn.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        createFloatingText(x, y, state.pointsPerClick);
        
        updateUI();
    });

    // קניית קליקר
    buyClickerBtn.addEventListener('click', () => {
        const price = Math.floor(state.clickerBasePrice * Math.pow(1.5, state.clickerLevel));
        if (state.score >= price) {
            state.score -= price;
            state.clickerLevel++;
            state.pointsPerClick += 1;
            updateUI();
        }
    });

    // קניית אוטומציה
    buyAutoBtn.addEventListener('click', () => {
        const price = Math.floor(state.autoBasePrice * Math.pow(1.5, state.autoLevel));
        if (state.score >= price) {
            state.score -= price;
            state.autoLevel++;
            state.autoClickValue += 2;
            updateUI();
        }
    });

    // לולאת ייצור אוטומטי (כל שנייה)
    setInterval(() => {
        if (state.autoClickValue > 0) {
            state.score += state.autoClickValue;
            updateUI();
        }
    }, 1000);

    // אתחול
    updateUI();
</script>

</body>
</html>
