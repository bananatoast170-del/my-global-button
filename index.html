<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קליקר אקסטרים - עם שמירה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap');
        
        body {
            font-family: 'Assistant', sans-serif;
            background: radial-gradient(circle, #1a202c 0%, #0d1117 100%);
            user-select: none;
            overflow-x: hidden;
        }

        .click-animation {
            animation: click-pop 0.1s ease-out;
        }

        @keyframes click-pop {
            0% { transform: scale(1); }
            50% { transform: scale(0.92); }
            100% { transform: scale(1); }
        }

        .floating-text {
            position: absolute;
            pointer-events: none;
            animation: float-up 1s ease-out forwards;
            font-weight: bold;
            color: #fbbf24;
            font-size: 1.5rem;
            z-index: 50;
        }

        @keyframes float-up {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-120px); opacity: 0; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen text-white flex flex-col items-center justify-center p-4">

    <!-- Cloud Sync Status -->
    <div class="fixed top-4 right-4 flex items-center space-x-2 space-x-reverse glass-card px-3 py-1.5 rounded-full text-xs">
        <div id="save-status-dot" class="w-2 h-2 rounded-full bg-gray-500"></div>
        <span id="save-status-text">מתחבר...</span>
    </div>

    <!-- User Info -->
    <div class="fixed bottom-4 left-4 text-[10px] text-gray-500 opacity-50" id="user-id-display">
        ID: טוען...
    </div>

    <!-- Header & Score -->
    <div class="text-center mb-8">
        <h1 class="text-5xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500">
            קליקר אקסטרים
        </h1>
        <div class="text-4xl font-bold text-white drop-shadow-lg">
            <span id="score-display">0</span>
        </div>
        <div class="text-gray-400 font-medium mt-1">נקודות</div>
        <div class="text-sm text-blue-400 mt-2 bg-blue-900/30 px-3 py-1 rounded-full inline-block">
            ייצור אוטומטי: <span id="pps-display">0</span> לשנייה
        </div>
    </div>

    <!-- Main Game Area -->
    <div class="relative flex flex-col items-center">
        <button id="clicker-btn" class="relative w-56 h-56 rounded-full bg-gradient-to-br from-indigo-500 via-purple-600 to-pink-500 shadow-[0_0_50px_rgba(124,58,237,0.3)] flex items-center justify-center border-8 border-white/20 hover:border-white/40 transition-all active:scale-90 focus:outline-none group">
            <div class="absolute inset-0 rounded-full bg-white opacity-0 group-hover:opacity-10 transition-opacity"></div>
            <span class="text-7xl group-hover:scale-110 transition-transform">💎</span>
        </button>
        <div id="click-container" class="absolute inset-0 pointer-events-none"></div>
    </div>

    <!-- Upgrades Section -->
    <div class="mt-12 grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl">
        
        <!-- Upgrade 1: Click Power -->
        <button id="upgrade-click" class="glass-card p-4 rounded-2xl flex justify-between items-center hover:bg-white/10 transition-all disabled:opacity-40 disabled:grayscale disabled:cursor-not-allowed group">
            <div class="text-right">
                <div class="font-bold text-lg group-hover:text-yellow-400 transition-colors">כוח לחיצה</div>
                <div class="text-xs text-gray-400">בונוס: +<span id="click-inc">1</span> לכל לחיצה</div>
            </div>
            <div class="text-left">
                <div class="text-xs text-gray-500 mb-1">מחיר שדרוג</div>
                <div class="font-bold text-yellow-500 text-xl"><span id="click-cost">10</span></div>
            </div>
        </button>

        <!-- Upgrade 2: Auto Clicker -->
        <button id="upgrade-auto" class="glass-card p-4 rounded-2xl flex justify-between items-center hover:bg-white/10 transition-all disabled:opacity-40 disabled:grayscale disabled:cursor-not-allowed group">
            <div class="text-right">
                <div class="font-bold text-lg group-hover:text-blue-400 transition-colors">מכרה אוטומטי</div>
                <div class="text-xs text-gray-400">מוסיף +1 נקודה בכל שנייה</div>
            </div>
            <div class="text-left">
                <div class="text-xs text-gray-500 mb-1">מחיר שדרוג</div>
                <div class="font-bold text-yellow-500 text-xl"><span id="auto-cost">50</span></div>
            </div>
        </button>

        <!-- Reset Button (Optional) -->
        <button id="reset-game" class="md:col-span-2 text-xs text-gray-600 hover:text-red-400 transition-colors mt-4">
            איפוס התקדמות (זהירות!)
        </button>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'clicker-pro-save';

        // Game State Variables
        let score = 0;
        let pointsPerClick = 1;
        let pointsPerSecond = 0;
        let clickUpgradeCost = 10;
        let autoUpgradeCost = 50;
        let isLoaded = false;
        let currentUser = null;

        // UI Elements
        const scoreEl = document.getElementById('score-display');
        const ppsEl = document.getElementById('pps-display');
        const clickBtn = document.getElementById('clicker-btn');
        const clickContainer = document.getElementById('click-container');
        const upgradeClickBtn = document.getElementById('upgrade-click');
        const clickCostEl = document.getElementById('click-cost');
        const clickIncEl = document.getElementById('click-inc');
        const upgradeAutoBtn = document.getElementById('upgrade-auto');
        const autoCostEl = document.getElementById('auto-cost');
        const saveStatusText = document.getElementById('save-status-text');
        const saveStatusDot = document.getElementById('save-status-dot');
        const userIdDisplay = document.getElementById('user-id-display');
        const resetBtn = document.getElementById('reset-game');

        // --- Firebase Auth Flow ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                saveStatusText.innerText = "שגיאת חיבור";
                saveStatusDot.className = "w-2 h-2 rounded-full bg-red-500";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                userIdDisplay.innerText = `ID: ${user.uid}`;
                loadGameData(user.uid);
            }
        });

        // --- Data Persistence ---
        async function loadGameData(uid) {
            const docRef = doc(db, 'artifacts', appId, 'users', uid, 'gameState', 'current');
            
            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    score = data.score || 0;
                    pointsPerClick = data.pointsPerClick || 1;
                    pointsPerSecond = data.pointsPerSecond || 0;
                    clickUpgradeCost = data.clickUpgradeCost || 10;
                    autoUpgradeCost = data.autoUpgradeCost || 50;
                }
                isLoaded = true;
                saveStatusText.innerText = "מסונכרן";
                saveStatusDot.className = "w-2 h-2 rounded-full bg-green-500";
                updateUI();
            } catch (err) {
                console.error("Error loading:", err);
            }
        }

        async function saveGameData() {
            if (!currentUser || !isLoaded) return;
            
            saveStatusText.innerText = "שומר...";
            saveStatusDot.className = "w-2 h-2 rounded-full bg-yellow-500";
            
            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'gameState', 'current');
            try {
                await setDoc(docRef, {
                    score: Math.floor(score),
                    pointsPerClick,
                    pointsPerSecond,
                    clickUpgradeCost,
                    autoUpgradeCost,
                    lastSaved: new Date().toISOString()
                }, { merge: true });
                
                saveStatusText.innerText = "נשמר";
                saveStatusDot.className = "w-2 h-2 rounded-full bg-green-500";
            } catch (err) {
                console.error("Save error:", err);
                saveStatusText.innerText = "שגיאה בשמירה";
                saveStatusDot.className = "w-2 h-2 rounded-full bg-red-500";
            }
        }

        // --- Game Logic ---
        function updateUI() {
            scoreEl.innerText = Math.floor(score).toLocaleString();
            ppsEl.innerText = pointsPerSecond;
            clickCostEl.innerText = clickUpgradeCost.toLocaleString();
            clickIncEl.innerText = pointsPerClick;
            autoCostEl.innerText = autoUpgradeCost.toLocaleString();
            
            upgradeClickBtn.disabled = score < clickUpgradeCost;
            upgradeAutoBtn.disabled = score < autoUpgradeCost;
        }

        function createFloatingText(value) {
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = `+${value}`;
            const x = (Math.random() - 0.5) * 120;
            text.style.left = `calc(50% + ${x}px)`;
            text.style.top = `30%`;
            clickContainer.appendChild(text);
            setTimeout(() => text.remove(), 1000);
        }

        // Event Listeners
        clickBtn.addEventListener('click', () => {
            if (!isLoaded) return;
            score += pointsPerClick;
            clickBtn.classList.remove('click-animation');
            void clickBtn.offsetWidth; 
            clickBtn.classList.add('click-animation');
            createFloatingText(pointsPerClick);
            updateUI();
            // Save on every 10 clicks to reduce API calls, or just debounced
            debounceSave();
        });

        upgradeClickBtn.addEventListener('click', () => {
            if (score >= clickUpgradeCost) {
                score -= clickUpgradeCost;
                pointsPerClick += 1;
                clickUpgradeCost = Math.floor(clickUpgradeCost * 1.6);
                updateUI();
                saveGameData();
            }
        });

        upgradeAutoBtn.addEventListener('click', () => {
            if (score >= autoUpgradeCost) {
                score -= autoUpgradeCost;
                pointsPerSecond += 1;
                autoUpgradeCost = Math.floor(autoUpgradeCost * 1.8);
                updateUI();
                saveGameData();
            }
        });

        resetBtn.addEventListener('click', () => {
            if (confirm("האם אתה בטוח שברצונך לאפס את כל ההתקדמות?")) {
                score = 0;
                pointsPerClick = 1;
                pointsPerSecond = 0;
                clickUpgradeCost = 10;
                autoUpgradeCost = 50;
                updateUI();
                saveGameData();
            }
        });

        // Debounce saving to avoid hitting limits
        let saveTimeout;
        function debounceSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveGameData, 2000);
        }

        // Game Loop
        setInterval(() => {
            if (isLoaded && pointsPerSecond > 0) {
                score += (pointsPerSecond / 10);
                updateUI();
            }
        }, 100);

        // Auto-save every 30 seconds as backup
        setInterval(saveGameData, 30000);

        // Start
        initAuth();
    </script>
</body>
</html>
